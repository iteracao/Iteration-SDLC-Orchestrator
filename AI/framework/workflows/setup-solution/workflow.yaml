code: setup-solution
name: Setup Solution
phase: setup

purpose: >
  Deterministically validate and prepare a target repository workspace,
  minimal SDLC structure, and persisted setup tracking for the next
  documentation update workflow.

primaryAgent: setup-solution-system

requiredInputs:
  - name: solutionCode
    type: string
    required: true
  - name: solutionName
    type: string
    required: true
  - name: repositoryRoot
    type: string
    required: true
  - name: remoteRepositoryUrl
    type: string
    required: true
  - name: profileCode
    type: string
    required: true

knowledgeReads: []

producedArtifacts:
  - type: solution-setup-result
    name: Solution Setup Result
  - type: repository-setup-summary
    name: Repository Setup Summary

knowledgeUpdates:
  - context/overview.md
  - business/business-rules.md
  - business/workflows.md
  - architecture/architecture-overview.md
  - architecture/module-map.md
  - history/decisions.md
  - history/open-questions.md
  - history/known-gaps.md
  - analysis/latest-analysis.md

executionRules:
  - Execute deterministically as a system workflow; do not call an AI agent.
  - Repository root must already exist and be accessible.
  - Initialize Git if .git does not exist.
  - Validate the GitHub repository URL and resolve repository metadata before persistence.
  - Configure remote origin when remoteRepositoryUrl is provided and origin is not already configured.
  - Create /AI/solutions/<solutionCode>/ knowledge workspace if missing.
  - Seed required documentation files with fixed baseline structure if missing.
  - Do not overwrite existing documents blindly; preserve existing content.
  - Commit database state only after repository/bootstrap preparation succeeds.
  - Defer repository understanding and real documentation updates to the next workflow.

nextWorkflows:
  - update-target-documentation
