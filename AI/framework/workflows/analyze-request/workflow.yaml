code: analyze-request
name: Analyze Request
phase: analysis

purpose: >
  Analyze a requirement or request against current solution knowledge,
  repository evidence, and SDLC framework guidance.

primaryAgent: solution-analyst

requiredInputs:
  - name: requestTitle
    type: string
    required: true
  - name: requestDescription
    type: string
    required: true
  - name: targetSolutionId
    type: guid
    required: true

knowledgeReads:
  - context/overview.md
  - business/business-rules.md
  - business/workflows.md
  - architecture/architecture-overview.md
  - architecture/module-map.md
  - history/decisions.md
  - history/open-questions.md
  - history/known-gaps.md

producedArtifacts:
  - type: analysis-report
    name: Analysis Report
  - type: impacted-areas
    name: Impacted Areas
  - type: risk-list
    name: Risks
  - type: assumption-list
    name: Assumptions
  - type: open-question-list
    name: Open Questions
  - type: next-step-recommendations
    name: Recommended Next Steps

knowledgeUpdates:
  - analysis/latest-analysis.md
  - analysis/impacted-areas.md
  - history/open-questions.md
  - history/known-gaps.md

executionRules:
  - Use solution knowledge as current truth unless repository evidence clearly contradicts it.
  - Use repository evidence as proof layer, not as replacement for canonical docs.
  - Persist open questions discovered during analysis into history/open-questions.md.
  - Keep analysis concise, evidence-based, and structured.

nextWorkflows:
  - design-solution-change
